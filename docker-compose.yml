services:
  lab:
    image: ${NVIDIA_PYTORCH_IMAGE}
    runtime: nvidia
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    environment:
      - HOME=/workspace
    volumes:
      - ${HOST_WORKSPACE:-.}:/workspace
    ports:
      - "8888:8888"
    shm_size: "16gb"
    stdin_open: true
    tty: true
    gpus: all
    command: sleep infinity
